<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입고 이슈 바코드 스캔</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EEF1F4;
    --surface: #FFFFFF;
    --ink: #14213D;
    --slate: #5C6B7A;
    --slate-light: #94A3B3;
    --line: #DCE2E8;
    --ready: #2A9D8F;
    --ready-bg: #E4F3F1;
    --urgent: #E63946;
    --urgent-bg: #FCE8E9;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:20px 16px 60px;
  }
  .wrap{max-width:940px;margin:0 auto;}
  header{margin-bottom:18px;}
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px;font-weight:700;margin:0;letter-spacing:-0.01em;
  }
  .subtitle{font-size:13px;color:var(--slate);margin-top:2px;}
  .data-badge{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;color:var(--ready);background:var(--ready-bg);
    padding:4px 10px;border-radius:999px;margin-top:8px;
  }
  .data-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--ready);}

  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;}
  .stat .num{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1.1;}
  .stat .label{font-size:12px;color:var(--slate);margin-top:2px;}
  .stat.urgent .num{color:var(--urgent);}

  .scan-zone{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;position:relative;}
  .scan-row{display:flex;align-items:center;gap:10px;}
  .scan-dot{width:10px;height:10px;border-radius:50%;background:var(--ready);flex-shrink:0;}
  @media (prefers-reduced-motion: no-preference){.scan-dot{animation:pulse 1.8s ease-in-out infinite;}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  #barcodeInput{
    flex:1;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;
    letter-spacing:0.02em;border:none;outline:none;background:transparent;color:var(--ink);
    padding:8px 0;min-width:0;
  }
  #barcodeInput::placeholder{color:var(--slate-light);font-family:'Inter',sans-serif;font-weight:500;}
  .scan-hint{font-size:12px;color:var(--slate);margin-top:8px;padding-top:8px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .scan-hint button.link{background:none;border:none;color:var(--ready);font-size:12px;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;}
  .test-codes{display:none;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--slate);line-height:1.7;width:100%;}
  .test-codes.show{display:block;}
  .test-codes span{display:inline-block;background:var(--bg);border-radius:5px;padding:2px 7px;margin:0 4px 4px 0;cursor:pointer;}

  .flash{position:absolute;right:16px;top:16px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;opacity:0;transition:opacity .25s ease;}
  .flash.show{opacity:1;}
  .flash.ok{background:var(--ready-bg);color:var(--ready);}
  .flash.err{background:var(--urgent-bg);color:var(--urgent);}

  .last-scan{background:var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:18px;display:none;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .last-scan.show{display:flex;}
  .last-scan .ls-label{font-size:11px;font-weight:700;color:#8FA0B8;text-transform:uppercase;letter-spacing:.04em;flex-basis:100%;}
  .last-scan .ls-code{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#fff;}
  .last-scan .ls-name{font-size:13px;color:#B9C4D4;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .toolbar h2{font-size:14px;font-weight:700;margin:0;color:var(--slate);text-transform:uppercase;letter-spacing:.04em;}
  .toolbar .actions{display:flex;gap:8px;}
  .btn-ghost{
    font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;color:var(--slate);
    background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;
  }
  .btn-ghost:hover{border-color:var(--slate-light);}
  .btn-ghost:focus-visible,button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--ready);outline-offset:2px;}

  .list{display:flex;flex-direction:column;gap:8px;}
  .empty{background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius);padding:32px 16px;text-align:center;color:var(--slate);font-size:13px;}

  .row{
    background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line);
    border-radius:8px;padding:11px 14px;display:grid;
    grid-template-columns:1fr auto auto auto auto;align-items:center;gap:14px;
  }
  .row.urgent{border-left-color:var(--urgent);}
  @media (prefers-reduced-motion: no-preference){.row.new{animation:slideIn .28s ease-out;}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .row .info{min-width:0;}
  .row .pcode{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .pname{font-size:12px;color:var(--slate);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .meta{font-size:11px;color:var(--slate-light);margin-top:3px;display:flex;gap:8px;}
  .row .meta .barcode{font-family:'JetBrains Mono',monospace;}

  .qty{display:flex;align-items:center;gap:6px;}
  .qty button{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:14px;cursor:pointer;line-height:1;}
  .qty .n{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;min-width:18px;text-align:center;}

  select.issue-select{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:500;border:1px solid var(--line);border-radius:7px;padding:5px 8px;background:var(--surface);color:var(--ink);}

  .urgent-toggle{font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--slate);cursor:pointer;white-space:nowrap;}
  .urgent-toggle.on{background:var(--urgent-bg);border-color:var(--urgent);color:var(--urgent);}

  .del{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--slate-light);cursor:pointer;font-size:16px;}
  .del:hover{color:var(--urgent);background:var(--urgent-bg);}

  @media (max-width:640px){
    .row{grid-template-columns:1fr;gap:8px;}
    .row > *{width:100%;}
    .qty{justify-content:flex-start;}
    .summary{grid-template-columns:1fr 1fr 1fr;}
  }
</style>
</head>

  <div class="toolbar">

</div>

  const ISSUE_TYPES = ["파손", "사이즈 불량", "봉제 불량", "재고 부족", "오배송", "기타"];
  const LIST_KEY = "scan-list";
  const state = { items: [] };

  const $ = (id) => document.getElementById(id);
  const input = $("barcodeInput");
  const list = $("list");
  const emptyState = $("emptyState");
  const flash = $("flash");
  const scanZone = $("scanZone");
  const lastScan = $("lastScan");

  async function storageGet(key) {
    try {
      const res = await window.storage.get(key, false);
      return res ? res.value : null;
    } catch (e) {
      return null;
    }
  }
  async function storageSet(key, value) {
    try {
      await window.storage.set(key, value, false);
    } catch (e) {
      console.error("storage set failed", e);
    }
  }

  function keepFocus() { setTimeout(() => input.focus(), 10); }
  input.addEventListener("blur", keepFocus);
  scanZone.addEventListener("click", () => input.focus());

  function showFlash(type, msg) {
    flash.textContent = msg;
    flash.className = "flash show " + type;
    setTimeout(() => flash.classList.remove("show"), 1600);
  }

  let scanTimer = null;
  input.addEventListener("input", () => {
    clearTimeout(scanTimer);
    const val = input.value.trim();
    // 스캐너는 사람보다 훨씬 빠르게 문자를 입력하므로,
    // 짧은 시간(100ms) 동안 추가 입력이 없으면 스캔이 끝난 것으로 보고 자동 처리
    if (val.length >= 4) {
      scanTimer = setTimeout(() => processBarcode(), 100);
    }
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === "Tab") {
      e.preventDefault();
      clearTimeout(scanTimer);
      processBarcode();
    }
  });

  async function processBarcode() {
    const barcode = input.value.trim();
    input.value = "";
    if (!barcode) return;

    const product = PRODUCT_MASTER[barcode];
    if (!product) {
      showFlash("err", "미등록 바코드");
      return;
    }
    showFlash("ok", "스캔 완료");

    lastScan.classList.add("show");
    $("lsCode").textContent = product.code || "(코드없음)";
    $("lsName").textContent = product.name || "";

    state.items.unshift({
      id: Date.now() + Math.random(),
      barcode,
      code: product.code,
      name: product.name,
      category: product.category,
      time: new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" }),
      qty: 1,
      issue: ISSUE_TYPES[0],
      urgent: false,
      isNew: true,
    });
    render();
    await persistList();
  }

  async function persistList() {
    await storageSet(LIST_KEY, JSON.stringify(state.items));
  }

  async function updateItem(id, patch) {
    const item = state.items.find((i) => i.id === id);
    if (item) Object.assign(item, patch);
    render();
    await persistList();
  }

  async function removeItem(id) {
    state.items = state.items.filter((i) => i.id !== id);
    render();
    await persistList();
  }

  function render() {
    $("statTotal").textContent = state.items.length;
    $("statUniq").textContent = new Set(state.items.map((i) => i.barcode)).size;
    $("statUrgent").textContent = state.items.filter((i) => i.urgent).length;

    emptyState.style.display = state.items.length ? "none" : "block";
    list.querySelectorAll(".row").forEach((el) => el.remove());

    state.items.forEach((item) => {
      const row = document.createElement("div");
      row.className = "row" + (item.urgent ? " urgent" : "") + (item.isNew ? " new" : "");
      row.innerHTML = `
        <div class="info">
          <div class="pcode">${item.code || "(코드없음)"}</div>
          <div class="pname">${item.name || ""}</div>
          <div class="meta"><span class="barcode">${item.barcode}</span><span>${item.time}</span></div>
        </div>
        <div class="qty">
          <button data-act="dec">−</button><span class="n">${item.qty}</span><button data-act="inc">+</button>
        </div>
        <select class="issue-select">
          ${ISSUE_TYPES.map((t) => `<option ${t === item.issue ? "selected" : ""}>${t}</option>`).join("")}
        </select>
        <button class="urgent-toggle ${item.urgent ? "on" : ""}">${item.urgent ? "긴급" : "긴급 지정"}</button>
        <button class="del" title="삭제">×</button>
      `;
      row.querySelector('[data-act="dec"]').addEventListener("click", () => updateItem(item.id, { qty: Math.max(1, item.qty - 1) }));
      row.querySelector('[data-act="inc"]').addEventListener("click", () => updateItem(item.id, { qty: item.qty + 1 }));
      row.querySelector(".issue-select").addEventListener("change", (e) => updateItem(item.id, { issue: e.target.value }));
      row.querySelector(".urgent-toggle").addEventListener("click", () => updateItem(item.id, { urgent: !item.urgent }));
      row.querySelector(".del").addEventListener("click", () => removeItem(item.id));
      list.appendChild(row);
      item.isNew = false;
    });
  }

  $("clearBtn").addEventListener("click", async () => {
    if (state.items.length && confirm("스캔한 리스트를 모두 지울까요?")) {
      state.items = [];
      render();
      await persistList();
    }
  });

    const header = "시간,바코드,상품코드,상품명,공급처,수량,이슈유형,긴급여부\n";
    const rows = state.items
      .map((i) => [i.time, i.barcode, i.code, i.name, i.category, i.qty, i.issue, i.urgent ? "Y" : "N"].join(","))
      .join("\n");
    const blob = new Blob(["\uFEFF" + header + rows], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "입고이슈_스캔리스트.csv";
    a.click();
    URL.revokeObjectURL(url);
  });

  async function init() {
    const savedList = await storageGet(LIST_KEY);
    if (savedList) {
      try { state.items = JSON.parse(savedList) || []; } catch (e) {}
    }
    render();
    keepFocus();
  }

  init();
</script>
</body>
</html>
