<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입고 이슈 바코드 스캔</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1F4; --surface:#FFFFFF; --ink:#14213D; --slate:#5C6B7A; --slate-light:#94A3B3;
    --line:#DCE2E8; --ready:#2A9D8F; --ready-bg:#E4F3F1; --urgent:#E63946; --urgent-bg:#FCE8E9;
    --amber:#E8890C; --amber-bg:#FDF0DD; --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;padding:20px 16px 60px;}
  .wrap{max-width:980px;margin:0 auto;}
  header{margin-bottom:16px;}
  h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin:0;letter-spacing:-0.01em;}
  .subtitle{font-size:13px;color:var(--slate);margin-top:2px;}
  .data-badge{
    display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;color:var(--ready);background:var(--ready-bg);
    padding:4px 10px;border-radius:999px;margin-top:8px;
  }
  .data-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--ready);}

  .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;}
  .stat .num{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1.1;}
  .stat .label{font-size:12px;color:var(--slate);margin-top:2px;}
  .stat.urgent .num{color:var(--urgent);}

  .batch-bar{
    background:var(--ink);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .batch-bar label{font-size:11px;font-weight:700;color:#8FA0B8;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
  .batch-bar input{
    flex:1;min-width:140px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
    border-radius:6px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:7px 10px;
  }
  .batch-bar input::placeholder{color:#7A8AA0;}
  .batch-bar .hint{font-size:11px;color:#7A8AA0;width:100%;}
  .order-preview{
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#fff;
    background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:999px;white-space:nowrap;
  }
  .order-preview:empty{display:none;}
  .confirm-btn{
    font-family:'Inter',sans-serif;font-size:12.5px;font-weight:700;color:#fff;
    background:var(--ready);border:none;border-radius:6px;padding:7px 14px;cursor:pointer;white-space:nowrap;
  }
  .confirm-btn:hover{opacity:.9;}
  .confirm-btn.editing{background:var(--amber);}
  .batch-bar input:read-only{opacity:.75;}

  .scan-zone{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;position:relative;}
  .scan-row{display:flex;align-items:center;gap:10px;}
  .scan-dot{width:10px;height:10px;border-radius:50%;background:var(--ready);flex-shrink:0;}
  @media (prefers-reduced-motion: no-preference){.scan-dot{animation:pulse 1.8s ease-in-out infinite;}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  #barcodeInput{
    flex:1;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;letter-spacing:.02em;
    border:none;outline:none;background:transparent;color:var(--ink);padding:8px 0;min-width:0;
  }
  #barcodeInput::placeholder{color:var(--slate-light);font-family:'Inter',sans-serif;font-weight:500;}
  #barcodeInput:disabled{cursor:not-allowed;}
  .scan-zone.locked{background:var(--bg);}
  .scan-zone.locked .scan-dot{background:var(--slate-light);animation:none;}
  .scan-zone.locked #barcodeInput::placeholder{color:var(--urgent);font-weight:600;}
  .scan-hint{font-size:12px;color:var(--slate);margin-top:8px;padding-top:8px;border-top:1px solid var(--line);}

  .flash{position:absolute;right:16px;top:16px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;opacity:0;transition:opacity .25s ease;}
  .flash.show{opacity:1;}
  .flash.ok{background:var(--ready-bg);color:var(--ready);}
  .flash.err{background:var(--urgent-bg);color:var(--urgent);}

  .last-scan{background:var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;display:none;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .last-scan.show{display:flex;}
  .last-scan .ls-label{font-size:11px;font-weight:700;color:#8FA0B8;text-transform:uppercase;letter-spacing:.04em;flex-basis:100%;}
  .last-scan .ls-code{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#fff;}
  .last-scan .ls-name{font-size:13px;color:#B9C4D4;}
  .last-scan .ls-company{font-size:11px;font-weight:700;color:var(--ready);background:rgba(42,157,143,.18);padding:2px 8px;border-radius:999px;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .toolbar h2{font-size:14px;font-weight:700;margin:0;color:var(--slate);text-transform:uppercase;letter-spacing:.04em;}
  .toolbar .actions{display:flex;gap:8px;}
  .btn-ghost{
    font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;color:var(--slate);
    background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;
  }
  .btn-ghost:hover{border-color:var(--slate-light);}
  .btn-ghost:focus-visible,button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--ready);outline-offset:2px;}

  .list{display:flex;flex-direction:column;gap:10px;}
  .empty{background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius);padding:32px 16px;text-align:center;color:var(--slate);font-size:13px;}

  .card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:8px;padding:12px 14px;}
  .card.urgent-memo{border-left-color:var(--amber);}
  @media (prefers-reduced-motion: no-preference){.card.new{animation:slideIn .28s ease-out;}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

  .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
  .card-head .titles{min-width:0;}
  .pcode{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14.5px;}
  .pname{font-size:12.5px;color:var(--slate);margin-top:1px;}
  .meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--bg);color:var(--slate);white-space:nowrap;}
  .tag.company{background:var(--ready-bg);color:var(--ready);}
  .tag.barcode{font-family:'JetBrains Mono',monospace;font-weight:500;}
  .del{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--slate-light);cursor:pointer;font-size:16px;flex-shrink:0;}
  .del:hover{color:var(--urgent);background:var(--urgent-bg);}

  .field-grid{display:grid;grid-template-columns:1.3fr .7fr .7fr 1.1fr;gap:8px;margin-top:8px;}
  .field{display:flex;flex-direction:column;gap:3px;}
  .field label{font-size:10px;font-weight:700;color:var(--slate-light);text-transform:uppercase;letter-spacing:.03em;}
  .field input,.field select{
    font-family:'Inter',sans-serif;font-size:12.5px;font-weight:500;border:1px solid var(--line);
    border-radius:6px;padding:5px 7px;background:var(--surface);color:var(--ink);width:100%;
  }
  .field input[type=number]{font-family:'JetBrains Mono',monospace;}
  .order-preview-mini{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ready);font-weight:700;margin-top:2px;}
  .order-preview-mini:empty{display:none;}

  .reorder-toggle{
    margin-top:10px;font-size:11.5px;font-weight:600;color:var(--slate);background:none;border:none;
    cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;
  }
  .reorder-toggle .chev{transition:transform .15s ease;}
  .reorder-toggle.open .chev{transform:rotate(90deg);}
  .reorder-panel{display:none;margin-top:8px;padding-top:10px;border-top:1px dashed var(--line);}
  .reorder-panel.show{display:block;}
  .reorder-grid{display:grid;grid-template-columns:auto 1fr .8fr 1fr .9fr 1fr;gap:8px;align-items:end;}
  .reorder-grid .field label{white-space:nowrap;}
  .confirm-check{display:flex;flex-direction:column;gap:3px;align-items:center;}
  .confirm-check input{width:18px;height:18px;margin-top:4px;}

  @media (max-width:760px){
    .field-grid{grid-template-columns:1fr 1fr;}
    .reorder-grid{grid-template-columns:1fr 1fr;}
    .summary{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>입고 이슈 바코드 스캔</h1>
    <div class="subtitle">스캔하면 상품코드·업체명·입고일이 자동으로 채워지고, 이 사이트에 그대로 쌓여요</div>
    <div class="data-badge"><span class="dot"></span>상품 데이터 6627개 연동됨</div>
  </header>

  <div class="summary">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="label">스캔 건수</div></div>
    <div class="stat urgent"><div class="num" id="statUnconfirmed">0</div><div class="label">미확인</div></div>
  </div>

  <div class="batch-bar">

    <div class="order-preview" id="orderPreview"></div>
  </div>

  <div class="scan-zone" id="scanZone">
    <div class="scan-row">
      <div class="scan-dot"></div>
      <input id="barcodeInput" type="text" placeholder="먼저 위에 발주서명을 입력하세요" autocomplete="off" disabled>
      <div class="flash" id="flash"></div>
    </div>
    <div class="scan-hint">전용 스캐너 연결 시 커서가 계속 유지된 상태로 바로 스캔됩니다</div>
  </div>

  <div class="last-scan" id="lastScan">
    <div class="ls-label">마지막 스캔</div>
    <div class="ls-code" id="lsCode"></div>
    <div class="ls-name" id="lsName"></div>
    <div class="ls-company" id="lsCompany"></div>
  </div>

  <div class="toolbar">
    <h2>입고 이슈 리스트</h2>
    <div class="actions">
      <button class="btn-ghost" id="exportBtn">CSV 내보내기 (시트 붙여넣기용)</button>
      <button class="btn-ghost" id="clearBtn">리스트 초기화</button>
    </div>
  </div>

  <div class="list" id="list">
    <div class="empty" id="emptyState">아직 스캔된 항목이 없어요. 위 입력창에 바코드를 스캔해보세요.</div>
  </div>
  <datalist id="memoOptions"></datalist>
</div>

  };
  const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

  function hangulToQwerty(str) {
    let out = "";
    for (const ch of str) {
      const code = ch.codePointAt(0);
      if (code >= 0xAC00 && code <= 0xD7A3) {
        const c = code - 0xAC00;
        const cho = CHO[Math.floor(c / (21 * 28))];
        const jung = JUNG[Math.floor((c % (21 * 28)) / 28)];
        const jong = JONG[c % 28];
        out += (JAMO_TO_KEY[cho] || "") + (JAMO_TO_KEY[jung] || "") + (jong ? (JAMO_TO_KEY[jong] || "") : "");
      } else if (JAMO_TO_KEY[ch]) {
        out += JAMO_TO_KEY[ch];
      } else {
        out += ch;
      }
    }
    return out.toUpperCase();
  }

  function lookupProduct(raw) {
    if (PRODUCT_MASTER[raw]) return { product: PRODUCT_MASTER[raw], resolvedBarcode: raw };
    const converted = hangulToQwerty(raw);
    if (converted !== raw && PRODUCT_MASTER[converted]) {
      return { product: PRODUCT_MASTER[converted], resolvedBarcode: converted };
    }
    return null;
  }

  async function processBarcode() {
    const raw = input.value.trim();
    input.value = "";
    if (!raw) return;

    const found = lookupProduct(raw);
    if (!found) {
      showFlash("err", "미등록 바코드");
      return;
    }
    if (found.resolvedBarcode !== raw) {
      showFlash("ok", "한글 자판 감지 · 자동 복원됨");
    } else {
      showFlash("ok", "스캔 완료");
    }
    const barcode = found.resolvedBarcode;
    const product = found.product;

    lastScan.classList.add("show");
    $("lsCode").textContent = product.code || "(코드없음)";
    $("lsName").textContent = product.shortName || product.name || "";
    $("lsCompany").textContent = product.company || "-";

    state.items.unshift({
      id: Date.now() + Math.random(),
      barcode,
      code: product.code,
      name: product.name,
      shortName: product.shortName,
      company: product.company,
      date: todayLabel(),
      orderName: orderNameInput.value.trim(),
      reqQty: 1,
      recvQty: 1,
      memo: "",
      confirmed: false,
      noReceiveReason: "",
      reorderYn: "",
      reorderOrderName: "",
      expectedDate: "",
      reorderMemo: "",
      reorderOpen: false,
      isNew: true,
    });
    render();
    await persistList();
  }

  async function persistList() { await storageSet(LIST_KEY, JSON.stringify(state.items)); }

  async function updateItem(id, patch) {
    const item = state.items.find((i) => i.id === id);
    if (item) Object.assign(item, patch);
    render();
    await persistList();
  }
  async function removeItem(id) {
    state.items = state.items.filter((i) => i.id !== id);
    render();
    await persistList();
  }

  function render() {
    $("statTotal").textContent = state.items.length;
    $("statUnconfirmed").textContent = state.items.filter((i) => !i.confirmed).length;

    emptyState.style.display = state.items.length ? "none" : "block";
    list.querySelectorAll(".card").forEach((el) => el.remove());

    state.items.forEach((item) => {
      const card = document.createElement("div");
      card.className = "card" + (item.memo ? " urgent-memo" : "") + (item.isNew ? " new" : "");
      card.innerHTML = `
        <div class="card-head">
          <div class="titles">
            <div class="pcode">${item.code || "(코드없음)"}</div>
            <div class="pname" title="${item.name || ""}">${item.shortName || item.name || ""}</div>
            <div class="meta-row">
              <span class="tag company">${item.company || "업체미상"}</span>
              <span class="tag">${item.date}</span>
              <span class="tag barcode">${item.barcode}</span>
            </div>
          </div>
          <button class="del" title="삭제">×</button>
        </div>

        <div class="field-grid">
          <div class="field">
            <label>발주서명</label>
            <input type="text" data-f="orderName" value="${item.orderName || ""}">
            <span class="order-preview-mini">${formatOrderName(item.orderName)}</span>
          </div>
          <div class="field"><label>요청 수량</label><input type="number" min="0" data-f="reqQty" value="${item.reqQty}"></div>
          <div class="field"><label>입고 수량</label><input type="number" min="0" data-f="recvQty" value="${item.recvQty}"></div>
          <div class="field">
            <label>요청 메모</label>
            <input type="text" list="memoOptions" placeholder="선택 또는 직접입력" data-f="memo" value="${item.memo || ""}">
          </div>
        </div>

        <button class="reorder-toggle ${item.reorderOpen ? "open" : ""}"><span class="chev">▸</span> 재발주 정보 ${item.reorderOpen ? "접기" : "펼치기"}</button>
        <div class="reorder-panel ${item.reorderOpen ? "show" : ""}">
          <div class="reorder-grid">
            <div class="field confirm-check"><label>확인</label><input type="checkbox" data-f="confirmed" ${item.confirmed ? "checked" : ""}></div>
            <div class="field"><label>미입고 사유</label><input type="text" data-f="noReceiveReason" value="${item.noReceiveReason || ""}"></div>
            <div class="field"><label>재발주 여부</label>
              <select data-f="reorderYn">
                ${REORDER_YN.map((t) => `<option value="${t}" ${t === item.reorderYn ? "selected" : ""}>${t || "-"}</option>`).join("")}
              </select>
            </div>
            <div class="field"><label>재발주 발주서명</label><input type="text" data-f="reorderOrderName" value="${item.reorderOrderName || ""}"></div>
            <div class="field"><label>입고 예정일</label><input type="text" placeholder="MM/DD/요일" data-f="expectedDate" value="${item.expectedDate || ""}"></div>
            <div class="field"><label>발주 메모</label><input type="text" data-f="reorderMemo" value="${item.reorderMemo || ""}"></div>
          </div>
        </div>
      `;

      card.querySelector(".del").addEventListener("click", () => removeItem(item.id));
      card.querySelectorAll("[data-f]").forEach((el) => {
        const f = el.dataset.f;
        const evt = el.tagName === "SELECT" || el.type === "checkbox" ? "change" : "change";
        el.addEventListener(evt, () => {
          const val = el.type === "checkbox" ? el.checked : (el.type === "number" ? Number(el.value) : el.value);
          updateItem(item.id, { [f]: val });
        });
      });
      card.querySelector(".reorder-toggle").addEventListener("click", () => updateItem(item.id, { reorderOpen: !item.reorderOpen }));

      list.appendChild(card);
      item.isNew = false;
    });
  }

  $("clearBtn").addEventListener("click", async () => {
    if (state.items.length && confirm("리스트를 모두 지울까요?")) {
      state.items = [];
      render();
      await persistList();
    }
  });

  $("exportBtn").addEventListener("click", () => {
    if (!state.items.length) return;
    const header = ["입고일","업체명","발주서명","옵션명","상품코드","요청 수량","입고 수량(선택)","요청 메모","확인","미입고 사유","재발주 여부","재발주 발주서명","입고 예정일","발주 메모"].join(",") + "\n";
    const esc = (v) => `"${String(v ?? "").replace(/"/g, '""')}"`;
    const rows = state.items.map((i) => [
      i.date, i.company, formatOrderName(i.orderName), i.shortName || i.name, i.code, i.reqQty, i.recvQty, i.memo,
      i.confirmed ? "TRUE" : "", i.noReceiveReason, i.reorderYn, i.reorderOrderName, i.expectedDate, i.reorderMemo,
    ].map(esc).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + header + rows], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "입고이슈_리스트.csv"; a.click();
    URL.revokeObjectURL(url);
  });

  async function init() {
    const savedList = await storageGet(LIST_KEY);
    if (savedList) { try { state.items = JSON.parse(savedList) || []; } catch (e) {} }
    render();
    lockScan();
  }
  init();
</script>
</body>
</html>
